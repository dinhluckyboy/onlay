<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onlay Library</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dinhluckyboy/onlay@main/onlay.min.css"/> -->
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="./onlay.min.css" />
  </head>
  <body>
    <!-- header  -->
    <header id="modal__header">
      <div class="modal__container">
        <h1 class="title">Onlay.js</h1>
        <p class="modal__desc">
          Hướng dẫn sử dụng thư viện Onlay.js (Modal) được code hoàn toàn bằng
          Javascript
        </p>
      </div>
    </header>
    <!-- main  -->
    <main id="modal__main">
      <!-- benefits  -->
      <section id="modal__benefits" class="modal__section">
        <div class="modal__container">
          <h2 class="modal__title">1. Lợi ích</h2>
          <p class="modal__desc">
            Giúp ẩn hiện Modal, có thể tái sử dụng code giúp tiết kiệm thời gian
          </p>
        </div>
      </section>
      <!-- examples  -->
      <section id="modal__examples" class="modal__section">
        <div class="modal__container">
          <h2 class="modal__title">2. Ví dụ trực quan</h2>
          <p class="modal__desc">
            Click vào button dưới đây để xem ví dụ chi tiết &#128071;
          </p>
          <div class="modal__btns">
            <button class="modal__btn modal__btn--basic">Basic Modals</button>
            <button class="modal__btn modal__btn--button">
              Modal With Buttons
            </button>
            <button class="modal__btn modal__btn--large">
              Large Content Modal
            </button>
            <button class="modal__btn modal__btn--multiple">
              Multiple Modals
            </button>
            <button class="modal__btn modal__btn--embed">
              YouTube Embed Modal
            </button>
            <button class="modal__btn modal__btn--persistent">
              Persistent Modal
            </button>
            <button class="modal__btn modal__btn--outside">
              Input Content Outside
            </button>
          </div>
        </div>
      </section>
      <!-- usage  -->
      <section id="modal__usage" class="modal__section">
        <div class="modal__container">
          <h2 class="modal__title">3. Cách sử dụng</h2>
        </div>
      </section>
    </main>
    <!-- footer  -->
    <footer id="modal__footer"></footer>
    <!-- 1 basic modal  -->
    <template id="modal__onlay-basic" class="template__modal">
      <h2 class="template__title">Basic Modal</h2>
      <p class="template__desc">
        Đây là Basic Modal, bạn có thể tắt modal bằng cách nhấn vào button close
        ở góc trên bên phải, cũng có thể tắt modal bằng cách nhấn vào lớp phủ mờ
        bên ngoài modal (overlay), hoặc cũng có thể tắt modal bằng cách nhấn
        phím Esc (Escape) trên bàn phím...
      </p>
    </template>
    <!-- 2 modal with button  -->
    <template id="modal__onlay-button" class="template__modal">
      <h2 class="template__title">Modal With Buttons</h2>
      <p class="template__desc">
        Giống Basic Modal, bạn có thể tắt modal bằng cách nhấn vào button close
        ở góc trên bên phải, cũng có thể tắt modal bằng cách nhấn phím Esc
        (Escape) trên bàn phím, nhưng không thể tắt modal bằng cách nhấn vào lớp
        phủ mờ bên ngoài modal (overlay) do tôi đã tắt tính năng này vì tôi muốn
        người dùng tập trung vào đọc nội dung và xác nhận ở nút button, tránh
        trường hợp người dùng bấm nhầm
      </p>
      <p class="template__desc">
        Ở Modal With Buttons, khi new Onlay() ở js sẽ có thêm option footer là
        true, bạn sẽ có thể thêm button vào footer của modal, ở modal này tôi đã
        thêm sẵn 2 button là Cancel và Agree, khi footer là true, bạn có thể add
        button, set lại content cho footer, tôi sẽ hướng dẫn cách sử dụng chi
        tiết ở phần sau nên bạn yên tâm nhé!
      </p>
    </template>
    <!-- 3 Large Content Modal  -->
    <template id="modal__onlay-large" class="template__modal">
      <h2 class="template__title">Large Content Modal</h2>
      <p class="template__desc">
        Giống Basic Modal, bạn có thể tắt modal bằng cách nhấn vào button close
        ở góc trên bên phải, cũng có thể tắt modal bằng cách nhấn vào lớp phủ mờ
        bên ngoài modal (overlay), hoặc cũng có thể tắt modal bằng cách nhấn
        phím Esc (Escape) trên bàn phím...
      </p>
      <p class="template__desc">
        Điểm khác biệt duy nhất ở đây là khi nội dung content của modal nhiều
        lên, chúng tôi đã css sẵn trong thư viện để nội dung hiện thanh cuộn và
        hiện thị hợp lý trên giao diện người dùng

    <!-- 4 Multiple Modals  -->
    <template id="modal__onlay-multiple" class="template__modal">
      <h2 class="template__title">Multiple Modals</h2>
      <p class="template__desc">
        Đây là Multiple Modals, bạn có thể mở lồng ghép 1 modal bên bên một
        modal khác mà không gây ra lỗi
      </p>
      <p class="template__desc">

      <button
        class="modal__btn"
        onclick="{modalBasic.open()}"
        style="margin-top: 12px"
      >
        Basic Modal
      </button>
    </template>
    <!-- 5 Youtube Embed Modal  -->
    <template id="modal__onlay-embed" class="template__modal">
      <!-- <h2 class="template__title">Youtube Embed Modal</h2> -->
      <div class="template__video">
        <iframe
          width="100%"
          height="300px"
          src="https://www.youtube.com/embed/bpYspk9Z3as?list=RDbpYspk9Z3as"
          title="XUẤT GIÁ - KEYO ( JENA COVER ) || MUSIC VIDEO  | Ngồi buồn một mình đếm lá đếm hoa..."
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
    </template>
    <!-- 6 Persistent Modal  -->
    <template id="modal__onlay-persistent" class="template__modal">
      <h2 class="template__title">Persistent Modal</h2>
      <p class="template__desc">
        Với Modal này, khi tắt Madal thì code vẫn sẽ còn trong DOM, Modal vẫn sẽ
        giữ trạng thái cuộn hoặc text input nếu bạn đang nhập chưa xong
      </p>
      <p class="template__desc">
        <textarea
          name=""
          id=""
          class="template__textarea"
          placeholder="Write something..."
        ></textarea>
      </p>
    </template>
