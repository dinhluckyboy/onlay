<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onlay Library</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/dinhluckyboy/onlay@main/onlay.min.css"
    />
  </head>
  <body>
    <!-- header  -->
    <header>
      <h1 class="title">Onlay.js</h1>
      <p class="modal__desc">
        Hướng dẫn sử dụng thư viện Onlay.js (Modal) được code hoàn toàn bằng
        Javascript
      </p>
    </header>
    <!-- main  -->
    <main>
      <!-- benefits  -->
      <section id="benefits">
        <h2 class="title">Lợi ích</h2>
        <p class="modal__desc">
          Giúp ẩn hiện Modal, có thể tái sử dụng code giúp tiết kiệm thời gian
        </p>
      </section>
      <!-- examples  -->
      <section id="examples">
        <h2 class="title">Ví dụ trực quan</h2>
        <button class="modal__btn">Basic Modals</button>
        <button class="modal__btn">Modal With Buttons</button>
        <button class="modal__btn">Large Content Modal</button>
        <button class="modal__btn">Multiple Modals</button>
        <button class="modal__btn">YouTube Embed Modal</button>
      </section>
      <!-- usage  -->
      <section id="usage">
        <h2 class="title">Cách sử dụng</h2>
      </section>
    </main>
    <!-- footer  -->
    <footer></footer>
    <template id="model-1">
      <h2>Model</h2>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime facilis
        molestiae vel, repudiandae distinctio obcaecati illum, veritatis dolorem
        aspernatur, blanditiis optio at voluptas omnis consequuntur ipsa. Quod
        dicta molestiae fugit odit laborum eligendi, quasi, veritatis atque rem,
        itaque qui? Alias, obcaecati dignissimos aperiam dolore illum excepturi
        eligendi aspernatur debitis, rem iure rerum nobis magni. Reiciendis, ut
        distinctio, voluptatum quasi cupiditate sint facere doloremque quas
        consectetur natus placeat porro omnis nostrum illo. Accusamus animi a
        voluptate porro amet, molestiae cum? Magni voluptas dignissimos facilis
      </p>
    </template>
    <script src="https://cdn.jsdelivr.net/gh/dinhluckyboy/onlay@main/onlay.min.js"></script>
    <script>
      const title = document.querySelector("#title");
      const model = new Onlay({
        templateId: "model-1",
        footer: true,
      });
      title.onclick = () => {
        model.open();
      };
    </script>
  </body>
</html>
